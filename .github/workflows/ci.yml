name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spektra
          POSTGRES_PASSWORD: spektra_test
          POSTGRES_DB: spektra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spektra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spektra
          POSTGRES_PASSWORD: spektra_dev
          POSTGRES_DB: spektra_dev
        ports:
          - 5433:5432
        options: --health-cmd "pg_isready -U spektra" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: apps/api
      - run: npx prisma generate && npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://spektra:spektra_dev@localhost:5433/spektra_dev
      - run: npm run seed
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://spektra:spektra_dev@localhost:5433/spektra_dev
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
      - name: Start API
        run: npm run start &
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://spektra:spektra_dev@localhost:5433/spektra_dev
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: spektra-ci-secret
          PORT: 3001
          RUNTIME_MODE: LOCAL_SIMULATED
      - name: Start Frontend
        run: npm run dev &
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3001/api
      - name: Wait for services
        run: sleep 10
      - name: Run Playwright
        run: npx playwright test
        env:
          CI: true
