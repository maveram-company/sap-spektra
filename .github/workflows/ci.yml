name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spektra
          POSTGRES_PASSWORD: spektra_test
          POSTGRES_DB: spektra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spektra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # TODO: Add Playwright E2E job. Requires running backend + frontend servers
  # before test execution (e.g. via `npm run dev &` or a docker-compose setup).
  # Recommended approach: use a dedicated docker-compose.ci.yml that starts
  # all services, then run `npx playwright test` against them.
