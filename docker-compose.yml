services:
  postgres:
    image: postgres:16-alpine
    container_name: spektra-postgres
    environment:
      POSTGRES_USER: spektra
      POSTGRES_PASSWORD: spektra_dev
      POSTGRES_DB: spektra_dev
    ports:
      - '5433:5432'
    volumes:
      - spektra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spektra -d spektra_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spektra-redis
    ports:
      - '6379:6379'
    volumes:
      - spektra_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: spektra-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://spektra:spektra_dev@postgres:5432/spektra_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: spektra-local-dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spektra-frontend
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  spektra_pgdata:
  spektra_redisdata:
