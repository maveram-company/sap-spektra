        - !Ref AlertsTopic

  AlarmThreadPool:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-ThreadPoolPct'
      MetricName: APP_ThreadPoolPct
      Namespace: SAPAlwaysOps
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
