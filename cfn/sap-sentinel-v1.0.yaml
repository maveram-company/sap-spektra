AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Avvale SAP AlwaysOps v1.5 — Stack completo de monitoreo, remediacion automatica,
  chatbot IA, operaciones programadas y orquestacion HA para sistemas SAP.
  Incluye 20+ Lambdas, 16+ tablas DynamoDB, 3 SNS topics, HTTP API Gateway v2
  con JWT Auth (Cognito), KMS, EventBridge, Step Functions, CloudWatch alarms y RBAC.

# ═══════════════════════════════════════════════════════════════
#  PARAMETROS
# ═══════════════════════════════════════════════════════════════

Parameters:
  Environment:
    Type: String
    Default: Production
    AllowedValues: [Production, Staging, Development]
    Description: Ambiente de despliegue

  SAPSystemId:
    Type: String
    Default: SAP-PRD-01
    Description: ID del sistema SAP principal a monitorear

  SAPSystemSID:
    Type: String
    Default: PRD
    Description: SID del sistema SAP

  SAPSystemType:
    Type: String
    Default: SAP_PO
    AllowedValues: [SAP_PO, SAP_ECC, SAP_S4HANA, SAP_BW, SAP_NW, SAP_FIORI]
    Description: Tipo de sistema SAP

  DBType:
    Type: String
    Default: SAP_ASE
    AllowedValues: [SAP_ASE, HANA, ORACLE, MSSQL, DB2, MAXDB]
    Description: Tipo de base de datos

  EC2InstanceId:
    Type: String
    Default: i-0000000000example
    Description: ID de la instancia EC2 del servidor SAP

  SESFromAddress:
    Type: String
    Default: alwaysops@example.com
    Description: Direccion de email remitente (debe estar verificada en SES)

  SESToAddresses:
    Type: String
    Default: admin@example.com
    Description: Direcciones de email destino (separadas por coma)

  TeamsWebhookURL:
    Type: String
    Default: ''
    NoEcho: true
    Description: URL del webhook de Microsoft Teams (opcional)

  ApprovalSecret:
    Type: String
    Default: auto-generate
    NoEcho: true
    Description: Secreto HMAC para firmar tokens de aprobacion. Dejar 'auto-generate' para crear automaticamente via SecretsManager.

  EnableBedrock:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Habilitar Amazon Bedrock para recomendaciones IA

  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: Region de Amazon Bedrock

  LambdaS3Bucket:
    Type: String
    Description: Bucket S3 con los ZIPs de las Lambdas

  LambdaS3Prefix:
    Type: String
    Default: sap-alwaysops/v1.0/
    Description: Prefijo S3 para los ZIPs de las Lambdas

  MovideskToken:
    Type: String
    Default: ''
    NoEcho: true
    Description: Token de API de Movidesk (opcional, dejar vacio para desactivar)

  MovideskAgentId:
    Type: String
    Default: ''
    Description: ID del agente Movidesk que crea los tickets

  MovideskClientId:
    Type: String
    Default: ''
    Description: ID del cliente Movidesk

  AuditBucket:
    Type: String
    Default: ''
    Description: Bucket S3 para reportes de auditoria (opcional)

  CustomRunbooksBucket:
    Type: String
    Default: ''
    Description: Bucket S3 con custom-runbooks.json (opcional)

  OperatingSystemType:
    Type: String
    Default: LINUX
    AllowedValues:
      - LINUX
      - WINDOWS
    Description: Sistema operativo de las instancias SAP (Linux o Windows)

  SAPLandscape:
    Type: String
    Default: PRD
    AllowedValues:
      - PRD
      - QAS
      - DEV
    Description: Landscape SAP (PRD=auto-remediacion, QAS=requiere aprobacion, DEV=solo monitoreo)

  ProductVersion:
    Type: String
    Default: '1.5.0'
    Description: Version del producto SAP AlwaysOps (SSOT desde version.json)

Conditions:
  BedrockEnabled: !Equals [!Ref EnableBedrock, 'true']
  HasTeamsWebhook: !Not [!Equals [!Ref TeamsWebhookURL, '']]
  HasMovidesk: !Not [!Equals [!Ref MovideskToken, '']]
  HasAuditBucket: !Not [!Equals [!Ref AuditBucket, '']]
  AutoGenerateApprovalSecret: !Equals [!Ref ApprovalSecret, 'auto-generate']

# ═══════════════════════════════════════════════════════════════
#  RECURSOS
# ═══════════════════════════════════════════════════════════════

Resources:

  # ─── KMS Key para encriptar datos sensibles ───
  AlwaysOpsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Avvale SAP AlwaysOps v1.0 encryption key
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:GenerateDataKeyWithoutPlaintext
              - kms:DescribeKey
              - kms:CreateGrant
              - kms:ReEncryptFrom
              - kms:ReEncryptTo
              - kms:EnableKey
              - kms:DisableKey
              - kms:GetKeyPolicy
              - kms:PutKeyPolicy
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
              - kms:TagResource
              - kms:UntagResource
            Resource: '*'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: '1.4'

  AlwaysOpsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/sap-alwaysops
      TargetKeyId: !Ref AlwaysOpsKMSKey

  # ─── v2.0 Seguridad: Secreto HMAC auto-generado para aprobaciones ───
  ApprovalHmacSecret:
    Type: AWS::SecretsManager::Secret
    Condition: AutoGenerateApprovalSecret
    Properties:
      Name: !Sub 'sap-alwaysops/${Environment}/approval-hmac-secret'
      Description: Secreto HMAC-SHA256 para firmar tokens de aprobacion. Auto-generado.
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      KmsKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── DynamoDB: 9 tablas (7 originales + 2 discovery) ───

  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-incidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: systemId-timestamp-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Incidentes expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  ApprovalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-approvals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-created-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: type-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Aprobaciones expiran en 30 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  MetricsHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-metrics-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: recordType
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: systemId-timestamp-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: recordType-index
          KeySchema:
            - AttributeName: recordType
              KeyType: HASH
            - AttributeName: sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Metricas historicas expiran en 30 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 30d

  RunbookExecutionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-runbook-executions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: executedAt
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: systemId-executedAt-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
            - AttributeName: executedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Ejecuciones de runbooks expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  AdvisorResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-advisor-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # TTL: Resultados de advisor expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── SNS Topics: 3 según documento ───

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sap-alwaysops-alerts
      KmsMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  ApprovalsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sap-alwaysops-approvals
      KmsMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  AdvisorTopic:
    Type: AWS::SNS::Topic
    Condition: BedrockEnabled
    Properties:
      TopicName: sap-alwaysops-advisor
      KmsMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── SSM Parameters ───

  SystemsConfigParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /sap-alwaysops/systems-config
      Type: String
      Value: !Sub |
        [
          {
            "systemId": "${SAPSystemId}",
            "systemType": "${SAPSystemType}",
            "sid": "${SAPSystemSID}",
            "environment": "${Environment}",
            "enabled": true,
            "database": {
              "type": "${DBType}",
              "instanceId": "${EC2InstanceId}"
            },
            "instanceId": "${EC2InstanceId}"
          }
        ]
      Description: Configuracion de sistemas SAP monitoreados

  AlwaysOpsVersionParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /sap-alwaysops/version
      Type: String
      Value: '2.0'
      Description: Version de Avvale SAP AlwaysOps desplegada

  # ═══════════════════════════════════════════════════════════════
  #  IAM ROLES — Roles de dominio especificos (principio de minimo privilegio)
  # ═══════════════════════════════════════════════════════════════

  # ─── Role 1: DashboardApiRole (dashboard-api, chatbot-agent) ───

  DashboardApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sap-alwaysops-dashboard-api-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-dashboard-api-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB — lectura de todas las tablas + PutItem en ConversationsTable (chatbot)
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt IncidentsTable.Arn
                  - !Sub '${IncidentsTable.Arn}/index/*'
                  - !GetAtt ApprovalsTable.Arn
                  - !Sub '${ApprovalsTable.Arn}/index/*'
                  - !GetAtt MetricsHistoryTable.Arn
                  - !Sub '${MetricsHistoryTable.Arn}/index/*'
                  - !GetAtt RunbookExecutionsTable.Arn
                  - !Sub '${RunbookExecutionsTable.Arn}/index/*'
                  - !GetAtt AdvisorResultsTable.Arn
                  - !Sub '${AdvisorResultsTable.Arn}/index/*'
                  - !GetAtt ScheduledOperationsTable.Arn
                  - !Sub '${ScheduledOperationsTable.Arn}/index/*'
                  - !GetAtt ServiceNowTicketsTable.Arn
                  - !Sub '${ServiceNowTicketsTable.Arn}/index/*'
                  - !GetAtt DelegationsTable.Arn
                  - !Sub '${DelegationsTable.Arn}/index/*'
                  - !GetAtt AlertRulesTable.Arn
                  - !Sub '${AlertRulesTable.Arn}/index/*'
                  - !GetAtt BenchmarksTable.Arn
                  - !Sub '${BenchmarksTable.Arn}/index/*'
                  - !GetAtt DiscoveredInstancesTable.Arn
                  - !Sub '${DiscoveredInstancesTable.Arn}/index/*'
                  - !GetAtt LandscapeTopologyTable.Arn
                  - !Sub '${LandscapeTopologyTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:PutItem
                Resource:
                  - !GetAtt ConversationsTable.Arn
                  - !Sub '${ConversationsTable.Arn}/index/*'
              # CloudWatch — solo lectura (sin PutMetricData)
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              # SSM — solo lectura de parametros (sin SendCommand)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/sap-alwaysops/*'
              # Lambda invoke (chatbot proxy)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-*'
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Role 2: CollectorRole (universal-collector, discovery-engine, ha-monitor, preventive-engine, ewa-generator) ───

  CollectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sap-alwaysops-collector-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-collector-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB — tablas de dominio del collector
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt IncidentsTable.Arn
                  - !Sub '${IncidentsTable.Arn}/index/*'
                  - !GetAtt MetricsHistoryTable.Arn
                  - !Sub '${MetricsHistoryTable.Arn}/index/*'
                  - !GetAtt DiscoveredInstancesTable.Arn
                  - !Sub '${DiscoveredInstancesTable.Arn}/index/*'
                  - !GetAtt LandscapeTopologyTable.Arn
                  - !Sub '${LandscapeTopologyTable.Arn}/index/*'
                  - !GetAtt BenchmarksTable.Arn
                  - !Sub '${BenchmarksTable.Arn}/index/*'
              # CloudWatch — lectura y escritura de metricas
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              # SSM — solo lectura de parametros (collectors no ejecutan comandos)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/sap-alwaysops/*'
              # SSM — SendCommand solo para discovery-engine (scoped a instancias SAP)
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/AWS-RunShellScript'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/AWS-RunPowerShellScript'
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
                Condition:
                  StringEquals:
                    'ssm:ResourceTag/Project': 'SAP-AlwaysOps'
              # EC2 — describe para discovery
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: '*'
              # SNS — publicar alertas
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref AlertsTopic
              # Lambda invoke (cross-call entre collectors)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-*'
              # Step Functions
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:sap-alwaysops-*'
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Role 3: RunbookRole (runbook-engine, scheduler-engine, benchmark-engine) ───

  RunbookRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sap-alwaysops-runbook-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-runbook-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB — tablas de dominio del runbook
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt RunbookExecutionsTable.Arn
                  - !Sub '${RunbookExecutionsTable.Arn}/index/*'
                  - !GetAtt IncidentsTable.Arn
                  - !Sub '${IncidentsTable.Arn}/index/*'
                  - !GetAtt ScheduledOperationsTable.Arn
                  - !Sub '${ScheduledOperationsTable.Arn}/index/*'
                  - !GetAtt BenchmarksTable.Arn
                  - !Sub '${BenchmarksTable.Arn}/index/*'
              # DynamoDB — lectura de ApprovalsTable
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ApprovalsTable.Arn
                  - !Sub '${ApprovalsTable.Arn}/index/*'
              # SSM — parametros (scoped a sap-alwaysops)
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/sap-alwaysops/*'
              # SSM — SendCommand (scoped a documentos especificos e instancias con tag)
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/AWS-RunShellScript'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/AWS-RunPowerShellScript'
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
                Condition:
                  StringEquals:
                    'ssm:ResourceTag/Project': 'SAP-AlwaysOps'
              # SSM — GetCommandInvocation (necesita scope amplio para consultar resultados)
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                Resource: '*'
              # Secrets Manager — credenciales de BD por SID
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sap-alwaysops/*'
              # CloudWatch — lectura y escritura
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricData
                Resource: '*'
              # Lambda invoke (approval-gateway, bedrock-advisor)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-*'
              # SNS — publicar a AlertsTopic y ApprovalsTopic
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref AlertsTopic
                  - !Ref ApprovalsTopic
              # S3 — solo lectura de custom runbooks
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::sap-alwaysops-*'
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Role 4: NotificationRole (email-agent, slack-agent, teams-agent, servicenow-agent, movidesk-agent, alert-rules-engine, escalation-engine) ───

  NotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sap-alwaysops-notification-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-notification-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB — tablas de dominio de notificaciones
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt IncidentsTable.Arn
                  - !Sub '${IncidentsTable.Arn}/index/*'
                  - !GetAtt AlertRulesTable.Arn
                  - !Sub '${AlertRulesTable.Arn}/index/*'
                  - !GetAtt ServiceNowTicketsTable.Arn
                  - !Sub '${ServiceNowTicketsTable.Arn}/index/*'
              # DynamoDB — lectura de ApprovalsTable (para escalation)
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ApprovalsTable.Arn
                  - !Sub '${ApprovalsTable.Arn}/index/*'
              # SES — envio de emails (scoped a identidades de la cuenta)
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*'
              # SNS — publicar a AlertsTopic y ApprovalsTopic
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref AlertsTopic
                  - !Ref ApprovalsTopic
              # Secrets Manager — tokens de integracion (movidesk, teams webhooks)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sap-alwaysops/*'
              # Lambda invoke
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-*'
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Role 5: ApprovalRole (approval-gateway, audit-reporter) ───

  ApprovalRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sap-alwaysops-approval-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-approval-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # DynamoDB — escritura completa en ApprovalsTable y DelegationsTable
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt ApprovalsTable.Arn
                  - !Sub '${ApprovalsTable.Arn}/index/*'
                  - !GetAtt DelegationsTable.Arn
                  - !Sub '${DelegationsTable.Arn}/index/*'
              # DynamoDB — lectura de IncidentsTable y RunbookExecutionsTable (audit-reporter)
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt IncidentsTable.Arn
                  - !Sub '${IncidentsTable.Arn}/index/*'
                  - !GetAtt RunbookExecutionsTable.Arn
                  - !Sub '${RunbookExecutionsTable.Arn}/index/*'
              # SNS — publicar
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref AlertsTopic
                  - !Ref ApprovalsTopic
              # Lambda invoke (trigger runbook-engine despues de aprobacion)
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-*'
              # S3 — audit reports
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::sap-alwaysops-*'
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
              # Secrets Manager (approval HMAC secret)
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sap-alwaysops/*'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Role 6: BedrockAdvisorRole (bedrock-advisor) — Condicional ───

  BedrockAdvisorRole:
    Type: AWS::IAM::Role
    Condition: BedrockEnabled
    Properties:
      RoleName: sap-alwaysops-bedrock-advisor-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: sap-alwaysops-bedrock-advisor-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Bedrock — invocacion de modelos Anthropic
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.*'
              # DynamoDB — tabla de resultados del advisor
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt AdvisorResultsTable.Arn
                  - !Sub '${AdvisorResultsTable.Arn}/index/*'
              # SNS — publicar resultados
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref AlertsTopic
                  - !If [BedrockEnabled, !Ref AdvisorTopic, !Ref 'AWS::NoValue']
              # KMS
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt AlwaysOpsKMSKey.Arn
              # SQS (DLQ)
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt AlwaysOpsDLQ.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── Lambda: Universal Collector ───

  UniversalCollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-universal-collector
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt CollectorRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}universal-collector.zip'
      Environment:
        Variables:
          SYSTEM_ID: !Ref SAPSystemId
          SYSTEM_TYPE: !Ref SAPSystemType
          SYSTEM_SID: !Ref SAPSystemSID
          DB_TYPE: !Ref DBType
          ENVIRONMENT: !Ref Environment
          EC2_INSTANCE_ID: !Ref EC2InstanceId
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          INCIDENTS_TABLE: !Ref IncidentsTable
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
          MAINTENANCE_WINDOWS_PARAM: /sap-alwaysops/maintenance-windows
          OS_TYPE: !Ref OperatingSystemType
          SAP_LANDSCAPE: !Ref SAPLandscape
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  CollectorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-collector-5min
      Description: Ejecuta el collector cada 5 minutos
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt UniversalCollectorFunction.Arn
          Id: collector-target
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  CollectorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UniversalCollectorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CollectorScheduleRule.Arn

  # ─── Lambda: HA Monitor ───

  HAMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-ha-monitor
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt CollectorRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}ha-monitor.zip'
      Environment:
        Variables:
          SYSTEM_ID: !Ref SAPSystemId
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
          OS_TYPE: !Ref OperatingSystemType
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # ─── EventBridge: HA Monitor Schedule (cada 5 minutos) ───
  HAMonitorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-ha-monitor-schedule
      Description: 'Ejecuta HA Monitor cada 5 minutos'
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Id: HAMonitorTarget
          Arn: !GetAtt HAMonitorFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  HAMonitorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HAMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HAMonitorScheduleRule.Arn

  # ─── Lambda: Runbook Engine ───

  RunbookEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-runbook-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt RunbookRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}runbook-engine.zip'
      Environment:
        Variables:
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          APPROVAL_FUNCTION_ARN: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sap-alwaysops-approval-gateway'
          BEDROCK_ADVISOR_ARN: !If [BedrockEnabled, !GetAtt BedrockAdvisorFunction.Arn, '']
          RUNBOOK_EXECUTIONS_TABLE: !Ref RunbookExecutionsTable
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          CUSTOM_RUNBOOKS_BUCKET: !Ref CustomRunbooksBucket
          MAINTENANCE_WINDOWS_PARAM: /sap-alwaysops/maintenance-windows
          OS_TYPE: !Ref OperatingSystemType
          SAP_LANDSCAPE: !Ref SAPLandscape
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # ─── Lambda: Approval Gateway ───

  ApprovalGatewayFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-approval-gateway
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ApprovalRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}approval-gateway.zip'
      Environment:
        Variables:
          APPROVALS_TABLE: !Ref ApprovalsTable
          RUNBOOK_ENGINE_ARN: !GetAtt RunbookEngineFunction.Arn
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          APPROVAL_SECRET: !If
            - AutoGenerateApprovalSecret
            - !Sub '{{resolve:secretsmanager:sap-alwaysops/${Environment}/approval-hmac-secret}}'
            - !Ref ApprovalSecret
          APPROVAL_TIMEOUT_HOURS: '4'
          DELEGATIONS_TABLE: !Ref DelegationsTable
          APPROVAL_API_URL: !Sub 'https://${AlwaysOpsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/public'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # (Lambda Function URL eliminada — ahora se accede via API Gateway + JWT)

  # ─── Lambda: Bedrock Advisor ───

  BedrockAdvisorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-bedrock-advisor
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !If [BedrockEnabled, !GetAtt BedrockAdvisorRole.Arn, !Ref 'AWS::NoValue']
      Timeout: 90
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}bedrock-advisor.zip'
      Environment:
        Variables:
          BEDROCK_REGION: !Ref BedrockRegion
          BEDROCK_MODEL_ID: anthropic.claude-haiku-4-5-20251001
          BEDROCK_ENABLED: !Ref EnableBedrock
          ADVISOR_RESULTS_TABLE: !Ref AdvisorResultsTable
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          ADVISOR_TOPIC_ARN: !If [BedrockEnabled, !Ref AdvisorTopic, '']
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          CW_NAMESPACE: SAPAlwaysOps
          AI_CONFIG_PARAM: /sap-alwaysops/ai-config
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # EventBridge: UC2 cada 6 horas
  AdvisorUC2ScheduleRule:
    Type: AWS::Events::Rule
    Condition: BedrockEnabled
    Properties:
      Name: sap-alwaysops-advisor-uc2-6h
      Description: Prediccion de disco UC2 cada 6 horas
      ScheduleExpression: 'rate(6 hours)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt BedrockAdvisorFunction.Arn
          Id: advisor-uc2
          Input: '{"useCase": "UC2"}'
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  AdvisorUC2Permission:
    Type: AWS::Lambda::Permission
    Condition: BedrockEnabled
    Properties:
      FunctionName: !Ref BedrockAdvisorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AdvisorUC2ScheduleRule.Arn

  # EventBridge: UC4 diario a las 22:00 UTC
  AdvisorUC4ScheduleRule:
    Type: AWS::Events::Rule
    Condition: BedrockEnabled
    Properties:
      Name: sap-alwaysops-advisor-uc4-daily
      Description: Digest ejecutivo diario UC4 a las 22:00 UTC
      ScheduleExpression: 'cron(0 22 * * ? *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt BedrockAdvisorFunction.Arn
          Id: advisor-uc4
          Input: '{"useCase": "UC4"}'
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  AdvisorUC4Permission:
    Type: AWS::Lambda::Permission
    Condition: BedrockEnabled
    Properties:
      FunctionName: !Ref BedrockAdvisorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AdvisorUC4ScheduleRule.Arn

  # SNS subscription para UC1 (BREACH_DETECTED -> Advisor)
  AdvisorSNSSubscription:
    Type: AWS::SNS::Subscription
    Condition: BedrockEnabled
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt BedrockAdvisorFunction.Arn
      FilterPolicy:
        eventType:
          - BREACH_DETECTED
          - METRIC_SNAPSHOT

  AdvisorSNSPermission:
    Type: AWS::Lambda::Permission
    Condition: BedrockEnabled
    Properties:
      FunctionName: !Ref BedrockAdvisorFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  # ─── Lambda: Preventive Engine ───

  PreventiveEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-preventive-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt CollectorRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}preventive-engine.zip'
      Environment:
        Variables:
          CW_NAMESPACE: SAPAlwaysOps
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          MAINTENANCE_WINDOWS_PARAM: /sap-alwaysops/maintenance-windows
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  PreventiveScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-preventive-30min
      Description: Motor preventivo cada 30 minutos
      ScheduleExpression: 'rate(30 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt PreventiveEngineFunction.Arn
          Id: preventive-target
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  PreventiveSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PreventiveEngineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PreventiveScheduleRule.Arn

  # ─── Lambda: Email Agent ───

  EmailAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-email-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}email-agent.zip'
      Environment:
        Variables:
          SES_FROM_ADDRESS: !Ref SESFromAddress
          SES_TO_ADDRESSES: !Ref SESToAddresses
          APPROVAL_API_URL: !Sub 'https://${AlwaysOpsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/public'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  EmailAgentAlertsSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt EmailAgentFunction.Arn

  EmailAgentAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  EmailAgentApprovalsSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref ApprovalsTopic
      Protocol: lambda
      Endpoint: !GetAtt EmailAgentFunction.Arn

  EmailAgentApprovalsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EmailAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref ApprovalsTopic

  # ─── Lambda: Teams Agent ───

  TeamsAgentFunction:
    Type: AWS::Lambda::Function
    Condition: HasTeamsWebhook
    Properties:
      FunctionName: sap-alwaysops-teams-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}teams-agent.zip'
      Environment:
        Variables:
          TEAMS_WEBHOOK_URL: !Ref TeamsWebhookURL
          APPROVAL_API_URL: !Sub 'https://${AlwaysOpsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/public'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  TeamsAgentAlertsSub:
    Type: AWS::SNS::Subscription
    Condition: HasTeamsWebhook
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt TeamsAgentFunction.Arn

  TeamsAgentAlertsPermission:
    Type: AWS::Lambda::Permission
    Condition: HasTeamsWebhook
    Properties:
      FunctionName: !Ref TeamsAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  # ─── Lambda: Dashboard API ───

  DashboardApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-dashboard-api
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt DashboardApiRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}dashboard-api.zip'
      Environment:
        Variables:
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          INCIDENTS_TABLE: !Ref IncidentsTable
          APPROVALS_TABLE: !Ref ApprovalsTable
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
          CW_NAMESPACE: SAPAlwaysOps
          SCHEDULED_OPS_TABLE: !Ref ScheduledOperationsTable
          ADVISOR_RESULTS_TABLE: !Ref AdvisorResultsTable
          CHATBOT_FUNCTION: !Ref ChatbotAgentFunction
          RUNBOOK_EXECUTIONS_TABLE: !Ref RunbookExecutionsTable
          APPROVAL_FUNCTION_ARN: !GetAtt ApprovalGatewayFunction.Arn
          ALERT_RULES_ENGINE_ARN: !GetAtt AlertRulesEngineFunction.Arn
          BENCHMARK_ENGINE_ARN: !GetAtt BenchmarkEngineFunction.Arn
          AUDIT_REPORTER_ARN: !GetAtt AuditReporterFunction.Arn
          DISCOVERED_INSTANCES_TABLE: !Ref DiscoveredInstancesTable
          LANDSCAPE_TOPOLOGY_TABLE: !Ref LandscapeTopologyTable
          DISCOVERY_ENGINE_FUNCTION: !Ref DiscoveryEngineFunction
          VITE_COGNITO_USER_POOL_ID: !Ref SAPAlwaysOpsUserPool
          VITE_COGNITO_CLIENT_ID: !Ref SAPAlwaysOpsUserPoolClient
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # (Lambda Function URL eliminada — ahora se accede via API Gateway + JWT)

# ═══════════════════════════════════════════════════════════════
#  SQS DLQ — Dead Letter Queue para EventBridge
# ═══════════════════════════════════════════════════════════════

  AlwaysOpsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: sap-alwaysops-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  AlwaysOpsDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AlwaysOpsDLQ
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AlwaysOpsDLQ.Arn

  # ─── Alarma: DLQ tiene mensajes (algo fallo) ───
  AlarmDLQDepth:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-DLQ-Messages'
      AlarmDescription: Hay mensajes en la DLQ — un EventBridge target fallo
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AlwaysOpsDLQ.QueueName
      AlarmActions:
        - !Ref AlertsTopic

  # ─── Alarmas: Error rate de Lambdas criticas > 5% en 5 min ───
  AlarmCollectorErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-Collector-Errors'
      AlarmDescription: Universal Collector tiene error rate > 5%
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: sap-alwaysops-universal-collector
      AlarmActions:
        - !Ref AlertsTopic

  AlarmRunbookErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-Runbook-Errors'
      AlarmDescription: Runbook Engine tiene error rate elevado
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: sap-alwaysops-runbook-engine
      AlarmActions:
        - !Ref AlertsTopic

  AlarmDashboardApiErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-DashboardApi-Errors'
      AlarmDescription: Dashboard API tiene error rate elevado
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: sap-alwaysops-dashboard-api
      AlarmActions:
        - !Ref AlertsTopic

  # ─── CloudWatch Alarms — Estáticas (~18 alarmas) ───

  # ASE Alarms
  AlarmASELogFull:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-ASE-LogFullPct'
      MetricName: DB_ASE_LogFullPct
      Namespace: SAPAlwaysOps
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
        - !Ref AlertsTopic

  AlarmASEPhysLog:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-ASE-PhysLogPct'
      MetricName: DB_ASE_PhysLogPct
      Namespace: SAPAlwaysOps
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 85
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
