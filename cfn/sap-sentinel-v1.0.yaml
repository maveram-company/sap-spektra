        - !Ref AlertsTopic

  AlarmJVMGC:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-JVM-GCOverheadPct'
      MetricName: APP_JVM_GCOverheadPct
      Namespace: SAPAlwaysOps
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
