      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
        - !Ref AlertsTopic

  AlarmPOStuck:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-PO-StuckMessages'
      MetricName: APP_PO_StuckMessages
      Namespace: SAPAlwaysOps
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
        - !Ref AlertsTopic

  AlarmABAPDumps:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-ABAP-ShortDumps24h'
      MetricName: APP_ABAP_ShortDumps24h
      Namespace: SAPAlwaysOps
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
        - !Ref AlertsTopic

  # HA Alarm
  AlarmHAReplicationLag:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-HA-ReplicationLag'
      MetricName: DB_HANA_ReplicationLag
      Namespace: SAPAlwaysOps/HA
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 300
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId
      AlarmActions:
        - !Ref AlertsTopic

  # ─── CloudWatch Anomaly Detection Alarms (3 ML) ───

  AnomalyDetectorLogGrowth:
    Type: AWS::CloudWatch::AnomalyDetector
    Properties:
      MetricName: DB_ASE_LogGrowthPctPerHr
      Namespace: SAPAlwaysOps
      Stat: Average
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId

  AlarmAnomalyLogGrowth:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-Anomaly-LogGrowth'
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              MetricName: DB_ASE_LogGrowthPctPerHr
              Namespace: SAPAlwaysOps
              Dimensions:
                - Name: SAPSystemId
                  Value: !Ref SAPSystemId
            Period: 300
            Stat: Average
        - Id: ad1
          Expression: ANOMALY_DETECTION_BAND(m1, 2)
      ThresholdMetricId: ad1
      ComparisonOperator: GreaterThanUpperThreshold
      EvaluationPeriods: 3
      AlarmActions:
        - !Ref AlertsTopic

  AnomalyDetectorGCOverhead:
    Type: AWS::CloudWatch::AnomalyDetector
    Properties:
      MetricName: APP_JVM_GCOverheadPct
      Namespace: SAPAlwaysOps
      Stat: Average
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId

  AlarmAnomalyGCOverhead:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-Anomaly-GCOverhead'
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              MetricName: APP_JVM_GCOverheadPct
              Namespace: SAPAlwaysOps
              Dimensions:
                - Name: SAPSystemId
                  Value: !Ref SAPSystemId
            Period: 300
            Stat: Average
        - Id: ad1
          Expression: ANOMALY_DETECTION_BAND(m1, 2)
      ThresholdMetricId: ad1
      ComparisonOperator: GreaterThanUpperThreshold
      EvaluationPeriods: 3
      AlarmActions:
        - !Ref AlertsTopic

  AnomalyDetectorFailedMessages:
    Type: AWS::CloudWatch::AnomalyDetector
    Properties:
      MetricName: APP_PO_FailedMessages
      Namespace: SAPAlwaysOps
      Stat: Sum
      Dimensions:
        - Name: SAPSystemId
          Value: !Ref SAPSystemId

  AlarmAnomalyFailedMessages:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'SAPAlwaysOps-${SAPSystemId}-Anomaly-FailedMessages'
      Metrics:
        - Id: m1
          MetricStat:
            Metric:
              MetricName: APP_PO_FailedMessages
              Namespace: SAPAlwaysOps
              Dimensions:
                - Name: SAPSystemId
                  Value: !Ref SAPSystemId
            Period: 300
            Stat: Sum
        - Id: ad1
          Expression: ANOMALY_DETECTION_BAND(m1, 2)
      ThresholdMetricId: ad1
      ComparisonOperator: GreaterThanUpperThreshold
      EvaluationPeriods: 3
      AlarmActions:
        - !Ref AlertsTopic

  # ─── Lambda: Movidesk Agent (condicional) ───

  MovideskAgentFunction:
    Type: AWS::Lambda::Function
    Condition: HasMovidesk
    Properties:
      FunctionName: sap-alwaysops-movidesk-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}movidesk-agent.zip'
      Environment:
        Variables:
          MOVIDESK_TOKEN: !Ref MovideskToken
          MOVIDESK_AGENT_ID: !Ref MovideskAgentId
          MOVIDESK_CLIENT_ID: !Ref MovideskClientId
          INCIDENTS_TABLE: !Ref IncidentsTable
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  MovideskAgentAlertsSub:
    Type: AWS::SNS::Subscription
    Condition: HasMovidesk
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt MovideskAgentFunction.Arn

  MovideskAgentAlertsPermission:
    Type: AWS::Lambda::Permission
    Condition: HasMovidesk
    Properties:
      FunctionName: !Ref MovideskAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  MovideskAgentApprovalsSub:
    Type: AWS::SNS::Subscription
    Condition: HasMovidesk
    Properties:
      TopicArn: !Ref ApprovalsTopic
      Protocol: lambda
      Endpoint: !GetAtt MovideskAgentFunction.Arn

  MovideskAgentApprovalsPermission:
    Type: AWS::Lambda::Permission
    Condition: HasMovidesk
    Properties:
      FunctionName: !Ref MovideskAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref ApprovalsTopic

  # ─── Lambda: Escalation Engine ───

  EscalationEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-escalation-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 60
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}escalation-engine.zip'
      Environment:
        Variables:
          APPROVALS_TABLE: !Ref ApprovalsTable
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          RUNBOOK_ENGINE_ARN: !GetAtt RunbookEngineFunction.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  EscalationScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-escalation-10min
      Description: Motor de escalacion cada 10 minutos
      ScheduleExpression: 'rate(10 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt EscalationEngineFunction.Arn
          Id: escalation-target
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  EscalationSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EscalationEngineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EscalationScheduleRule.Arn

  # ─── Lambda: Audit Reporter (condicional) ───

  AuditReporterFunction:
    Type: AWS::Lambda::Function
    Condition: HasAuditBucket
    Properties:
      FunctionName: sap-alwaysops-audit-reporter
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ApprovalRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}audit-reporter.zip'
      Environment:
        Variables:
          INCIDENTS_TABLE: !Ref IncidentsTable
          APPROVALS_TABLE: !Ref ApprovalsTable
          RUNBOOK_EXECUTIONS_TABLE: !Ref RunbookExecutionsTable
          ADVISOR_RESULTS_TABLE: !Ref AdvisorResultsTable
          AUDIT_BUCKET: !Ref AuditBucket
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  AuditReporterScheduleRule:
    Type: AWS::Events::Rule
    Condition: HasAuditBucket
    Properties:
      Name: sap-alwaysops-audit-weekly
      Description: Reporte de auditoria semanal (lunes 08:00 UTC)
      ScheduleExpression: 'cron(0 8 ? * MON *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt AuditReporterFunction.Arn
          Id: audit-target
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  AuditReporterSchedulePermission:
    Type: AWS::Lambda::Permission
    Condition: HasAuditBucket
    Properties:
      FunctionName: !Ref AuditReporterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AuditReporterScheduleRule.Arn

  # ─── SSM Parameter: Maintenance Windows ───

  MaintenanceWindowsParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /sap-alwaysops/maintenance-windows
      Type: String
      Value: '{}'
      Description: Ventanas de mantenimiento activas (JSON object por systemId)

  # ─── SSM Parameter: AI Config (toggles + limites) ───

  AiConfigParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /sap-alwaysops/ai-config
      Type: String
      Value: !Sub |
        {"UC1_enabled":true,"UC2_enabled":true,"UC3_enabled":true,"UC4_enabled":true,"UC5_enabled":true,"UC6_enabled":true,"UC7_enabled":true,"chatbot_enabled":true,"daily_token_limit":100000,"monthly_cost_limit_usd":50}
      Description: Configuracion IA — toggles UC1-UC7, limites de tokens y costos

  # ─── DynamoDB: Tabla de conversaciones del chatbot ───

  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-conversations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # TTL: Conversaciones del chatbot expiran en 7 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 7d

  # ─── DynamoDB: Tabla de operaciones programadas ───

  ScheduledOperationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-scheduled-operations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: nextRunAt
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: scheduledTime
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-nextRun-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: nextRunAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: system-scheduledTime-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
            - AttributeName: scheduledTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: entityType-scheduledTime-index
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: scheduledTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Operaciones programadas expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  # ─── DynamoDB: Tabla de tickets de ServiceNow ───

  ServiceNowTicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-servicenow-tickets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH
        - AttributeName: systemId
          KeyType: RANGE
      # TTL: Tickets de ServiceNow expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  DelegationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-delegations'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: delegationId
          AttributeType: S
        - AttributeName: delegatorEmail
          AttributeType: S
        - AttributeName: delegateEmail
          AttributeType: S
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: delegationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: delegator-index
          KeySchema:
            - AttributeName: delegatorEmail
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: delegate-email-index
          KeySchema:
            - AttributeName: delegateEmail
              KeyType: HASH
            - AttributeName: pk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # TTL: Delegaciones expiran en 30 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt AlwaysOpsKMSKey.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── v1.0 H38: DynamoDB — Alert Rules Table ───
  AlertRulesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-alert-rules'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ruleId
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: ruleId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: system-index
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: type-index
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt AlwaysOpsKMSKey.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── v1.0 H40: DynamoDB — Benchmarks Table ───
  BenchmarksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-benchmarks'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # TTL: Benchmarks expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt AlwaysOpsKMSKey.Arn
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── DynamoDB: Discovery Engine — Instancias descubiertas ───

  DiscoveredInstancesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-discovered-instances
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # TTL: Instancias descubiertas expiran en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  # ─── DynamoDB: Discovery Engine — Topologia de landscape SAP ───

  LandscapeTopologyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sap-alwaysops-landscape-topology
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: entityType-index
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      # TTL: Topologia del landscape expira en 90 dias
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref AlwaysOpsKMSKey
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: TTL
          Value: 90d

  # ─── Lambda: Discovery Engine — Descubrimiento profundo SAP ───

  DiscoveryEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-discovery-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt CollectorRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}discovery-engine.zip'
      Environment:
        Variables:
          DISCOVERED_INSTANCES_TABLE: !Ref DiscoveredInstancesTable
          LANDSCAPE_TOPOLOGY_TABLE: !Ref LandscapeTopologyTable
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # EventBridge: Discovery Engine semanal (Lunes 06:00 UTC)
  DiscoveryWeeklyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-discovery-weekly
      Description: 'Re-descubrimiento semanal de instancias SAP'
      ScheduleExpression: 'cron(0 6 ? * MON *)'
      State: ENABLED
      Targets:
        - Id: DiscoveryTarget
          Arn: !GetAtt DiscoveryEngineFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  DiscoveryWeeklyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DiscoveryEngineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DiscoveryWeeklyRule.Arn

  # ─── Lambda: EWA Generator — Reporte semanal tipo Early Watch Alert ───

  EwaGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-ewa-generator
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt CollectorRole.Arn
      Timeout: 300
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}ewa-generator.zip'
      Environment:
        Variables:
          INCIDENTS_TABLE: !Ref IncidentsTable
          RUNBOOK_EXECUTIONS_TABLE: !Ref RunbookExecutionsTable
          ADVISOR_RESULTS_TABLE: !Ref AdvisorResultsTable
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          CW_NAMESPACE: SAPAlwaysOps
          SES_FROM_ADDRESS: !Ref SESFromAddress
          SES_TO_ADDRESSES: !Ref SESToAddresses
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # EventBridge: EWA Generator semanal (Lunes 06:00 UTC)
  EwaWeeklyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-ewa-weekly
      Description: 'Generar reporte EWA semanal'
      ScheduleExpression: 'cron(0 6 ? * MON *)'
      State: ENABLED
      Targets:
        - Id: EwaTarget
          Arn: !GetAtt EwaGeneratorFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  EwaWeeklyPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EwaGeneratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EwaWeeklyRule.Arn

  # ─── v1.0 H38: Lambda — Alert Rules Engine ───
  AlertRulesEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-alert-rules-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}alert-rules-engine.zip'
      Environment:
        Variables:
          ALERT_RULES_TABLE: !Ref AlertRulesTable
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          CW_NAMESPACE: SAPAlwaysOps
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # SNS Subscription: Alert Rules Engine recibe metricas del collector
  AlertRulesEngineSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt AlertRulesEngineFunction.Arn

  AlertRulesEngineSNSPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AlertRulesEngineFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  # ─── v1.0 H40: Lambda — Benchmark Engine ───
  BenchmarkEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-benchmark-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt RunbookRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}benchmark-engine.zip'
      Environment:
        Variables:
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
          BENCHMARKS_TABLE: !Ref BenchmarksTable
          CW_NAMESPACE: SAPAlwaysOps
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # EventBridge: Benchmark Engine ejecuta diario a las 01:00 UTC
  BenchmarkScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-benchmark-daily
      Description: 'Recalcular benchmarks diariamente a las 01:00 UTC'
      ScheduleExpression: 'cron(0 1 * * ? *)'
      State: ENABLED
      Targets:
        - Id: BenchmarkTarget
          Arn: !GetAtt BenchmarkEngineFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  BenchmarkSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BenchmarkEngineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BenchmarkScheduleRule.Arn

  # ─── Lambda: Chatbot Agent (interaccion con cliente via IA) ───

  ChatbotAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-chatbot-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 60
      MemorySize: 512
      Role: !GetAtt DashboardApiRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}chatbot-agent.zip'
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-haiku-4-5-20251001
          BEDROCK_REGION: !Ref BedrockRegion
          CONVERSATIONS_TABLE: !Ref ConversationsTable
          SCHEDULED_OPS_TABLE: !Ref ScheduledOperationsTable
          INCIDENTS_TABLE: !Ref IncidentsTable
          ADVISOR_RESULTS_TABLE: !Ref AdvisorResultsTable
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          CW_NAMESPACE: SAPAlwaysOps
          OS_TYPE: !Ref OperatingSystemType
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  # (Lambda Function URL eliminada — ahora se accede via API Gateway + JWT)

  # ─── Lambda: Scheduler Engine (operaciones programadas) ───

  SchedulerEngineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-scheduler-engine
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt RunbookRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}scheduler-engine.zip'
      Environment:
        Variables:
          SCHEDULED_OPS_TABLE: !Ref ScheduledOperationsTable
          INCIDENTS_TABLE: !Ref IncidentsTable
          ALERTS_TOPIC_ARN: !Ref AlertsTopic
          APPROVAL_FUNCTION: !Ref ApprovalGatewayFunction
          BEDROCK_ADVISOR_FUNCTION: !If [BedrockEnabled, !Ref BedrockAdvisorFunction, '']
          SYSTEMS_CONFIG_PARAM: /sap-alwaysops/systems-config
          CW_NAMESPACE: SAPAlwaysOps
          EC2_INSTANCE_ID: !Ref EC2InstanceId
          OS_TYPE: !Ref OperatingSystemType
          METRICS_HISTORY_TABLE: !Ref MetricsHistoryTable
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  SchedulerEngineScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: sap-alwaysops-scheduler-engine-trigger
      Description: Ejecuta scheduler-engine cada 5 minutos
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Id: SchedulerEngine
          Arn: !GetAtt SchedulerEngineFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt AlwaysOpsDLQ.Arn

  SchedulerEngineSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedulerEngineFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SchedulerEngineScheduleRule.Arn

  # ─── Lambda: Slack Agent ───

  SlackAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-slack-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}slack-agent.zip'
      Environment:
        Variables:
          SLACK_WEBHOOK_SECRET_ARN: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sap-alwaysops/slack-webhook'
          APPROVAL_API_URL: !Sub 'https://${AlwaysOpsHttpApi}.execute-api.${AWS::Region}.amazonaws.com/public'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  SlackAgentAlertsSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt SlackAgentFunction.Arn

  SlackAgentAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SlackAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

  # ─── Lambda: ServiceNow Agent ───

  ServiceNowAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sap-alwaysops-servicenow-agent
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt NotificationRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Sub '${LambdaS3Prefix}servicenow-agent.zip'
      Environment:
        Variables:
          SERVICENOW_SECRET_ARN: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:sap-alwaysops/servicenow-credentials'
          SERVICENOW_TICKETS_TABLE: !Ref ServiceNowTicketsTable
          ASSIGNMENT_GROUP: 'SAP Basis'
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps
        - Key: Version
          Value: !Ref ProductVersion

  ServiceNowAgentAlertsSub:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: lambda
      Endpoint: !GetAtt ServiceNowAgentFunction.Arn

  ServiceNowAgentAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ServiceNowAgentFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref AlertsTopic

# ═══════════════════════════════════════════════════════════════
#  COGNITO — Autenticacion para el Dashboard Frontend v1.0
# ═══════════════════════════════════════════════════════════════

  SAPAlwaysOpsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-user-pool'
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true

  SAPAlwaysOpsUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref SAPAlwaysOpsUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false

  SAPAlwaysOpsAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admins
      Description: Administradores de Avvale SAP AlwaysOps
      UserPoolId: !Ref SAPAlwaysOpsUserPool

  SAPAlwaysOpsOperatorsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: operators
      Description: Operadores de Avvale SAP AlwaysOps (lectura + escritura)
      UserPoolId: !Ref SAPAlwaysOpsUserPool

  SAPAlwaysOpsViewersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: viewers
      Description: Visualizadores de Avvale SAP AlwaysOps (solo lectura)
      UserPoolId: !Ref SAPAlwaysOpsUserPool

# ═══════════════════════════════════════════════════════════════
#  API GATEWAY v2 — HTTP API + JWT Auth (Cognito) v1.0
#  Reemplaza las 3 Lambda Function URLs publicas con un unico
#  API Gateway protegido por JWT Authorizer de Cognito.
# ═══════════════════════════════════════════════════════════════

  AlwaysOpsHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      ProtocolType: HTTP
      Description: HTTP API Gateway para Avvale SAP AlwaysOps v1.0
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${FrontendDistribution.DomainName}'
          - 'http://localhost:5173'
          - 'http://localhost:3456'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  AlwaysOpsHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      StageName: '$default'
      AutoDeploy: true

  AlwaysOpsJwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      AuthorizerType: JWT
      Name: CognitoJwtAuthorizer
      IdentitySource: '$request.header.Authorization'
      JwtConfiguration:
        Audience:
          - !Ref SAPAlwaysOpsUserPoolClient
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${SAPAlwaysOpsUserPool}'

  # ─── Integraciones Lambda ───

  DashboardApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DashboardApiFunction.Arn
      PayloadFormatVersion: '2.0'

  ApprovalGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApprovalGatewayFunction.Arn
      PayloadFormatVersion: '2.0'

  # ─── Rutas JWT protegidas (Dashboard API catch-all) ───

  DashboardApiGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      RouteKey: 'GET /api/{proxy+}'
      AuthorizationType: JWT
      AuthorizerId: !Ref AlwaysOpsJwtAuthorizer
      Target: !Sub 'integrations/${DashboardApiIntegration}'

  DashboardApiPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      RouteKey: 'POST /api/{proxy+}'
      AuthorizationType: JWT
      AuthorizerId: !Ref AlwaysOpsJwtAuthorizer
      Target: !Sub 'integrations/${DashboardApiIntegration}'

  DashboardApiPutRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      RouteKey: 'PUT /api/{proxy+}'
      AuthorizationType: JWT
      AuthorizerId: !Ref AlwaysOpsJwtAuthorizer
      Target: !Sub 'integrations/${DashboardApiIntegration}'

  DashboardApiDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      RouteKey: 'DELETE /api/{proxy+}'
      AuthorizationType: JWT
      AuthorizerId: !Ref AlwaysOpsJwtAuthorizer
      Target: !Sub 'integrations/${DashboardApiIntegration}'

  # ─── Ruta publica para links de aprobacion por email (HMAC, sin JWT) ───

  PublicApprovalRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlwaysOpsHttpApi
      RouteKey: 'GET /public/approvals/{approvalId}/{action}'
      AuthorizationType: NONE
      Target: !Sub 'integrations/${ApprovalGatewayIntegration}'

  # ─── Permisos Lambda para API Gateway ───

  DashboardApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AlwaysOpsHttpApi}/*'

  ApprovalGatewayApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApprovalGatewayFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AlwaysOpsHttpApi}/*'

# ═══════════════════════════════════════════════════════════════
#  FRONTEND — S3 + CloudFront para el Dashboard v1.0
# ═══════════════════════════════════════════════════════════════

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-frontend'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  # ═══════════════════════════════════════════════════════════════
  #  CloudWatch Alarms — Sentinel Platform Health
  # ═══════════════════════════════════════════════════════════════

  # Alarm 1: Lambda error rate for collector (most critical Lambda)
  CollectorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-collector-errors'
      AlarmDescription: 'Universal Collector Lambda error rate exceeds threshold'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref UniversalCollectorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # Alarm 2: Lambda duration approaching timeout for runbook engine
  RunbookDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-runbook-duration'
      AlarmDescription: 'Runbook Engine Lambda duration exceeds 80% of timeout (240s of 300s)'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref RunbookEngineFunction
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 240000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # Alarm 3: DynamoDB throttling on any table
  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-dynamodb-throttles'
      AlarmDescription: 'DynamoDB read/write throttles detected on Incidents table'
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref IncidentsTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # Alarm 4: Dashboard API errors (user-facing)
  DashboardApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-dashboard-api-errors'
      AlarmDescription: 'Dashboard API Lambda error rate exceeds threshold'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DashboardApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # Alarm 5: Approval Gateway errors
  ApprovalGatewayErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-approval-errors'
      AlarmDescription: 'Approval Gateway Lambda errors — approvals may be failing'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApprovalGatewayFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # Alarm 6: Escalation Engine errors (critical for SLA compliance)
  EscalationErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-escalation-errors'
      AlarmDescription: 'Escalation Engine errors — escalations may not be firing'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EscalationEngineFunction
      Statistic: Sum
      Period: 600
      EvaluationPeriods: 2
      Threshold: 2
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: SAP-AlwaysOps

  # ─── DynamoDB: HA Orchestration — Operations Table ───

  HAOperationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-ha-operations'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: systemId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: bySystemId-timestamp
          KeySchema:
            - AttributeName: systemId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: byStatus
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: SAP-AlwaysOps
        - Key: Module
          Value: HA-Orchestration
        - Key: Version
          Value: !Ref ProductVersion

  # ─── DynamoDB: HA Orchestration — Prerequisites Table ───

  HAPrerequisitesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-ha-prerequisites'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Application
          Value: SAP-AlwaysOps
        - Key: Module
          Value: HA-Orchestration
        - Key: Version
          Value: !Ref ProductVersion

  # ─── DynamoDB: HA Orchestration — Driver Config Table ───

  HADriverConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-ha-driver-config'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Application
          Value: SAP-AlwaysOps
        - Key: Module
          Value: HA-Orchestration
        - Key: Version
          Value: !Ref ProductVersion

# ═══════════════════════════════════════════════════════════════
#  OUTPUTS
# ═══════════════════════════════════════════════════════════════

Outputs:
  ApiGatewayUrl:
    Description: URL del HTTP API Gateway para Avvale SAP AlwaysOps
    Value: !Sub 'https://${AlwaysOpsHttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  ApiGatewayId:
    Description: ID del HTTP API Gateway
    Value: !Ref AlwaysOpsHttpApi

  AlertsTopicArn:
    Description: ARN del SNS topic de alertas
    Value: !Ref AlertsTopic

  ApprovalsTopicArn:
    Description: ARN del SNS topic de aprobaciones
    Value: !Ref ApprovalsTopic

  AdvisorTopicArn:
    Condition: BedrockEnabled
    Description: ARN del SNS topic del advisor
    Value: !Ref AdvisorTopic

  KMSKeyArn:
    Description: ARN de la llave KMS
    Value: !GetAtt AlwaysOpsKMSKey.Arn

  DashboardApiRoleArn:
    Description: ARN del IAM Role para Dashboard API y Chatbot
    Value: !GetAtt DashboardApiRole.Arn

  CollectorRoleArn:
    Description: ARN del IAM Role para Collectors y Discovery
    Value: !GetAtt CollectorRole.Arn

  RunbookRoleArn:
    Description: ARN del IAM Role para Runbook, Scheduler y Benchmark
    Value: !GetAtt RunbookRole.Arn

  NotificationRoleArn:
    Description: ARN del IAM Role para agentes de notificacion
    Value: !GetAtt NotificationRole.Arn

  ApprovalRoleArn:
    Description: ARN del IAM Role para Approval Gateway y Audit Reporter
    Value: !GetAtt ApprovalRole.Arn

  CognitoUserPoolId:
    Description: ID del Cognito User Pool para autenticacion del dashboard
    Value: !Ref SAPAlwaysOpsUserPool

  CognitoClientId:
    Description: ID del Cognito User Pool Client para el frontend
    Value: !Ref SAPAlwaysOpsUserPoolClient

  FrontendBucketName:
    Description: Nombre del bucket S3 para el frontend
    Value: !Ref FrontendBucket

  CloudFrontDomainName:
    Description: Dominio de la distribucion CloudFront del frontend
    Value: !GetAtt FrontendDistribution.DomainName

  CloudFrontDistributionId:
    Description: ID de la distribucion CloudFront del frontend
    Value: !Ref FrontendDistribution

  SlackAgentFunctionArn:
    Description: ARN de la Lambda Function del Slack Agent
    Value: !GetAtt SlackAgentFunction.Arn

  ServiceNowAgentFunctionArn:
    Description: ARN de la Lambda Function del ServiceNow Agent
    Value: !GetAtt ServiceNowAgentFunction.Arn

  DelegationsTableName:
    Description: Tabla de delegaciones de aprobacion
    Value: !Ref DelegationsTable

  # v1.0 Outputs
  AlertRulesTableName:
    Description: Tabla de reglas de alerta personalizadas (H38)
    Value: !Ref AlertRulesTable

  BenchmarksTableName:
    Description: Tabla de benchmarks de rendimiento (H40)
    Value: !Ref BenchmarksTable

  AlertRulesEngineFunctionArn:
    Description: ARN de la Lambda del Alert Rules Engine (H38)
    Value: !GetAtt AlertRulesEngineFunction.Arn

  BenchmarkEngineFunctionArn:
    Description: ARN de la Lambda del Benchmark Engine (H40)
    Value: !GetAtt BenchmarkEngineFunction.Arn

  DLQUrl:
    Description: URL de la Dead Letter Queue para EventBridge
    Value: !Ref AlwaysOpsDLQ

  DLQArn:
    Description: ARN de la Dead Letter Queue
    Value: !GetAtt AlwaysOpsDLQ.Arn

  DiscoveredInstancesTableName:
    Description: Tabla de instancias SAP descubiertas (Phase 2)
    Value: !Ref DiscoveredInstancesTable

  LandscapeTopologyTableName:
    Description: Tabla de topologia de landscape SAP (Phase 2)
    Value: !Ref LandscapeTopologyTable

  DiscoveryEngineFunctionArn:
    Description: ARN de la Lambda del Discovery Engine (Phase 2)
    Value: !GetAtt DiscoveryEngineFunction.Arn

  EwaGeneratorFunctionArn:
    Description: ARN de la Lambda del EWA Generator (Phase 4)
    Value: !GetAtt EwaGeneratorFunction.Arn

  StackVersion:
    Description: Version de Avvale SAP AlwaysOps
    Value: '1.4'
