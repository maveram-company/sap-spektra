# ============================================================================
#  SAP AlwaysOps v1.5 -- Enterprise Hardening: GSI Definitions
#
#  This file documents all Global Secondary Indexes (GSIs) that must be added
#  to the main CloudFormation template (sap-sentinel-v1.0.yaml) to eliminate
#  DynamoDB Scan operations from hot-path Lambda functions.
#
#  Each GSI below replaces a Scan with a Query for O(1) partition access.
#  Add these GSI definitions to the corresponding DynamoDB table resources.
#
#  IMPORTANT: When adding GSIs to existing tables, deploy in stages to avoid
#  hitting the DynamoDB limit of 1 concurrent GSI creation per table.
# ============================================================================

# ─────────────────────────────────────────────────────────────────
#  TABLE: AlertRulesTable (sap-alwaysops-alert-rules)
#  Used by: alert-rules-engine/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: type-index
#  Purpose: List all alert rules without systemId filter (replaces 2 Scans).
#  Partition Key: entityType (S) -- fixed value 'ALERT_RULE' on all rule items
#  Sort Key: createdAt (S) -- enables sorting by creation date
#
#  Write-side requirement: All items in AlertRulesTable MUST include
#    entityType: 'ALERT_RULE' when created/updated.
#
#  CloudFormation snippet to add under AlertRulesTable.Properties.GlobalSecondaryIndexes:
#
#    - IndexName: type-index
#      KeySchema:
#        - AttributeName: entityType
#          KeyType: HASH
#        - AttributeName: createdAt
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AlertRulesTable.Properties.AttributeDefinitions:
#    - AttributeName: entityType
#      AttributeType: S
#    - AttributeName: createdAt
#      AttributeType: S

# ─────────────────────────────────────────────────────────────────
#  TABLE: ScheduledOpsTable (sap-alwaysops-scheduled-operations)
#  Used by: dashboard-api/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: system-scheduledTime-index
#  Purpose: List operations filtered by systemId without status filter.
#  Partition Key: systemId (S)
#  Sort Key: scheduledTime (S) -- enables chronological ordering
#
#  CloudFormation snippet to add under ScheduledOpsTable.Properties.GlobalSecondaryIndexes:
#
#    - IndexName: system-scheduledTime-index
#      KeySchema:
#        - AttributeName: systemId
#          KeyType: HASH
#        - AttributeName: scheduledTime
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to ScheduledOpsTable.Properties.AttributeDefinitions:
#    - AttributeName: systemId
#      AttributeType: S
#    - AttributeName: scheduledTime
#      AttributeType: S
#
#  ---------------------------------------------------------------
#
#  GSI: entityType-scheduledTime-index
#  Purpose: List ALL operations without any filter (replaces full-table Scan).
#  Partition Key: entityType (S) -- fixed value 'SCHEDULED_OP' on all items
#  Sort Key: scheduledTime (S)
#
#  Write-side requirement: All items in ScheduledOpsTable MUST include
#    entityType: 'SCHEDULED_OP' when created/updated.
#
#  CloudFormation snippet:
#
#    - IndexName: entityType-scheduledTime-index
#      KeySchema:
#        - AttributeName: entityType
#          KeyType: HASH
#        - AttributeName: scheduledTime
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AttributeDefinitions (if not already present):
#    - AttributeName: entityType
#      AttributeType: S

# ─────────────────────────────────────────────────────────────────
#  TABLE: LandscapeTopologyTable (sap-alwaysops-landscape-topology)
#  Used by: dashboard-api/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: entityType-index
#  Purpose: Load all topology entries without full-table Scan.
#  Partition Key: entityType (S) -- fixed value 'TOPOLOGY_ENTRY' on all items
#  Sort Key: none (all entries returned at once)
#
#  Write-side requirement: All items in LandscapeTopologyTable MUST include
#    entityType: 'TOPOLOGY_ENTRY' when created/updated.
#
#  CloudFormation snippet:
#
#    - IndexName: entityType-index
#      KeySchema:
#        - AttributeName: entityType
#          KeyType: HASH
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AttributeDefinitions:
#    - AttributeName: entityType
#      AttributeType: S

# ─────────────────────────────────────────────────────────────────
#  TABLE: MetricsHistoryTable (sap-alwaysops-metrics-history)
#  Used by: scheduler-engine/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: recordType-index
#  Purpose: Query FAILED_ORCHESTRATION records for recovery pipeline
#           (replaces Scan with begins_with(pk, 'FAILED_ORCHESTRATION#')).
#  Partition Key: recordType (S) -- e.g., 'FAILED_ORCHESTRATION', 'METRIC', etc.
#  Sort Key: sk (S) -- reuses table sort key for ordering
#
#  Write-side requirement: All FAILED_ORCHESTRATION items MUST include
#    recordType: 'FAILED_ORCHESTRATION' when created.
#
#  CloudFormation snippet:
#
#    - IndexName: recordType-index
#      KeySchema:
#        - AttributeName: recordType
#          KeyType: HASH
#        - AttributeName: sk
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AttributeDefinitions:
#    - AttributeName: recordType
#      AttributeType: S

# ─────────────────────────────────────────────────────────────────
#  TABLE: DelegationsTable (sap-alwaysops-delegations)
#  Used by: approval-gateway/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: delegate-email-index
#  Purpose: Find delegations where a user is the delegate (delegateEmail).
#           Replaces Scan with FilterExpression on delegateEmail.
#  Partition Key: delegateEmail (S)
#  Sort Key: pk (S) -- enables filtering by delegator
#
#  CloudFormation snippet:
#
#    - IndexName: delegate-email-index
#      KeySchema:
#        - AttributeName: delegateEmail
#          KeyType: HASH
#        - AttributeName: pk
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AttributeDefinitions:
#    - AttributeName: delegateEmail
#      AttributeType: S

# ─────────────────────────────────────────────────────────────────
#  TABLE: ApprovalsTable (sap-alwaysops-approvals)
#  Used by: escalation-engine/index.js
# ─────────────────────────────────────────────────────────────────
#
#  GSI: type-index
#  Purpose: Query batch notifications by type='BATCH_NOTIFICATION'
#           (replaces Scan with begins_with(pk, 'NOTIF_BATCH#') filter).
#  Partition Key: type (S)
#  Sort Key: createdAt (S) -- enables chronological ordering of batches
#
#  Write-side requirement: All BATCH_NOTIFICATION items MUST include
#    type: 'BATCH_NOTIFICATION' when created.
#
#  NOTE: This table may already have a 'status-created-index' GSI
#  (used by escalation-engine scanPendingApprovals). Ensure the new
#  'type-index' GSI does not conflict.
#
#  CloudFormation snippet:
#
#    - IndexName: type-index
#      KeySchema:
#        - AttributeName: type
#          KeyType: HASH
#        - AttributeName: createdAt
#          KeyType: RANGE
#      Projection:
#        ProjectionType: ALL
#
#  Also add to AttributeDefinitions:
#    - AttributeName: type
#      AttributeType: S

# ============================================================================
#  SUMMARY OF GSIs TO ADD
# ============================================================================
#
#  Table                       | GSI Name                        | PK            | SK
#  ----------------------------|---------------------------------|---------------|---------------
#  AlertRulesTable             | type-index                      | entityType    | createdAt
#  ScheduledOpsTable           | system-scheduledTime-index      | systemId      | scheduledTime
#  ScheduledOpsTable           | entityType-scheduledTime-index  | entityType    | scheduledTime
#  LandscapeTopologyTable      | entityType-index                | entityType    | (none)
#  MetricsHistoryTable         | recordType-index                | recordType    | sk
#  DelegationsTable            | delegate-email-index            | delegateEmail | pk
#  ApprovalsTable              | type-index                      | type          | createdAt
#
#  TOTAL: 7 new GSIs across 6 tables
#
# ============================================================================
#  WRITE-SIDE MIGRATION NOTES
# ============================================================================
#
#  For the GSIs with fixed partition keys (entityType, recordType, type),
#  you MUST backfill the attribute on existing items. Options:
#
#  1. One-time migration script: Scan each table once and add the new attribute.
#  2. Lazy backfill: Update the PutCommand/UpdateCommand calls to include
#     the new attribute, then run a one-time backfill for existing items.
#
#  The Lambda code changes in v1.5 already assume these attributes exist.
#  Deploy the GSIs BEFORE deploying the updated Lambda code, or use
#  feature flags to fall back to Scan if the GSI does not exist yet.
# ============================================================================
